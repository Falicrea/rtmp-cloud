
authMethod: http
authHTTPAddress: http://localhost:3030/mtx/connect?with_thumbnail=1
authHTTPExclude:
- action: api
- action: metrics
- action: pprof

###############################################
api: yes
apiAddress: :9997
apiEncryption: no

###############################################
webrtc: yes
webrtcAddress: :8889
webrtcEncryption: no
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302

###############################################
srt: yes
srtAddress: :8890

###############################################
pathDefaults:
  runOnReady: bash -c 'mkdir -p "./hls/$MTX_PATH" && ffmpeg -i srt://localhost:8890?streamid=read:$MTX_PATH -c:v copy -preset veryfast -crf 23 -c:a aac -b:a 128k -f hls -hls_time 6 -hls_list_size 0 -hls_flags append_list ./hls/$MTX_PATH/index.m3u8'
  runOnReadyRestart: yes
  # /mtx/disconnect est un endpoint interne : méthode POST + secret partagé.
  # $MTX_INTERNAL_SECRET doit être exporté dans l'environnement de MediaMTX
  # (même valeur que MTX_INTERNAL_SECRET côté service rtmp-cloud).
  runOnNotReady: curl -X POST -H "Authorization: Bearer $MTX_INTERNAL_SECRET" "http://localhost:3030/mtx/disconnect?name=$MTX_PATH"
