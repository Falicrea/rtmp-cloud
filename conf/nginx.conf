#   |_| \_\|_| |_|  |_|_|     |_|  |_|_____|____/___/_/   \_\ |____/ |_| |_| \_\_____/_/   \_\_|  |_|___|_| \_|\____| |____/|_____|_| \_\ \_/  |_____|_| \_\
#
rtmp {
    server {
        listen 1935;
        ping 30s;
        notify_method get;

        # video on demand for flv files
        application vod {
            play /mnt/flvs;
        }
        # video on demand for mp4 files
        application vod2 {
            play /mnt/mp4s;
        }

        application live {
            live on;
            allow play all;
            #-max_muxing_queue_size 4000
            #-hls_list_size 100
            on_publish http://auth_server:3030/auth;
            on_done http://auth_server:3030/end;

            record all;
            record_path /mnt/recordings;
            record_unique on;
            record_append off;
        }

        application record {
            live on; # Allows live input from above

            on_publish http://auth_server:3030/auth;
            on_done http://auth_server:3030/end;

            hls on; # Enable HTTP Live Streaming
            hls_fragment 3;
            hls_playlist_length 60;
            #hls_sync 100ms;
            hls_continuous on;
            deny play all;
            # Pointing this to an SSD is better as this involves lots of IO
            hls_path /mnt/hls/;
            hls_cleanup off;
            hls_nested on;

            record all;
            record_path /mnt/recordings;
            record_unique on;
            #record_suffix _%d%m%Y_%H%M%S.flv;
            record_append on;


            # Instruct clients to adjust resolution according to bandwidth
            hls_variant _mid BANDWIDTH=448000; # Medium bitrate, SD resolution
            hls_variant _high BANDWIDTH=1152000; # High bitrate, higher-than-SD resolution
            hls_variant _hd720 BANDWIDTH=2048000; # High bitrate, HD 720p resolution
            hls_variant _src BANDWIDTH=4096000; # Source bitrate, source resolution
        }

    }
}

http {
    open_file_cache max=200000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;
    gzip on;
    # gzip_static on;
    gzip_min_length 10240;
    gzip_comp_level 1;
    gzip_vary on;
    gzip_disable msie6;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types

    #access_log logs/access.log main;
    directio 512;
    server {
        listen 447;
        charset utf-8;
        location / {
            # Disable cache
            add_header 'Cache-Control' 'no-cache';
            # CORS setup
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length';
            # allow CORS preflight requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            types {
                application/dash+xml mpd;
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
                video/x-flv flv;
                video/mp4 mp4;
                video/webm webm;
            }
            root /mnt/;
        }

        location ~ \.pl$ {
            # Disable gzip (it makes scripts feel slower since they have to complete
            # before getting gzipped)
            gzip off;
            # Set the root to /usr/lib (inside this location this means that we are
            # giving access to the files under /usr/lib/cgi-bin)
            root /cgi-bin/;
            # Adjust non standard parameters (SCRIPT_FILENAME)
            fastcgi_param SCRIPT_FILENAME  $document_root$fastcgi_script_name;
            # Fastcgi parameters, include the standard ones
            include /usr/local/nginx/conf/fastcgi_params;
            
            # fcgiwrap
            fastcgi_pass unix:/var/run/fcgiwrap.socket;

            # fastcgi configuration
            fastcgi_buffers 256 48k;
            fastcgi_buffer_size 48k;
            fastcgi_connect_timeout 1500s;
            fastcgi_send_timeout 1500s;
            fastcgi_read_timeout 600s;
            fastcgi_busy_buffers_size 256k;
            fastcgi_temp_file_write_size 256k;
        }
    }
}
