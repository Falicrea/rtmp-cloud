services:
  rtmp:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - 443:443
      - 447:447
    networks:
      - local_network
    volumes:
      - hls:/mnt/hls
      - ./conf/rtmp.conf:/etc/nginx/nginx.conf
    container_name: rtmp_server

  auth:
    build:
      context: server
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - local_network
    volumes:
      - ./server:/server
    container_name: auth_server

volumes:
  hls:
    driver: local
    driver_opts:
      type: none,
      o: bind
      device: ./hls

networks:
  local_network:
    driver: bridge