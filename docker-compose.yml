services:
  rtmp:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - local_network
    stdin_open: true
    tty: true
    ports:
      - 447:447
      - 1935:1935
    depends_on:
      - auth
    healthcheck:
      test: curl --fail http://auth_server:3030/ || exit 1
      interval: 40s
      timeout: 30s
      retries: 3
      start_period: 60s
    volumes:
      - mnt:/mnt
      - ./conf:/usr/local/nginx/conf/
      - ./cgi-bin:/cgi-bin
    container_name: rtmp_server

  auth:
    build:
      context: server
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - local_network
    volumes:
      - mnt:/mnt
      - ./server:/server
    container_name: auth_server

volumes:
  mnt:
    driver: local
    driver_opts:
      type: none,
      o: bind
      device: ./mnt
  nginxconfig:

networks:
  local_network:
    driver: bridge