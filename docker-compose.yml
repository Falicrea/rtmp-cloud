services:
  rtmp:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - 1935:1935
    volumes:
      - hls:/mnt/hls
      - ./rtmp/nginx.conf:/etc/nginx/nginx.conf
    container_name: rtmp_server

  auth:
    build:
      context: server
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./server:/server
    container_name: auth_server

  nginx:
    restart: always
    container_name: nginx_server
    image: nginx
    ports:
      - 80:80
    volumes:
      - hls:/mnt/hls
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

volumes:
  hls:
    driver: local
    driver_opts:
      type: none,
      o: bind
      device: ./hls